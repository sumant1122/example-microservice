name: Python Microservice Pipeline

# Global configuration
env:
  IMAGE_NAME: "hello-world-service"
  IMAGE_TAG: "latest"

on_success: "echo 'Microservice deployed!'"
on_failure: "echo 'Deployment failed!'"

jobs:
  - name: Build
    steps:
      - name: Install Dependencies
        command: "uv venv && source .venv/bin/activate && uv pip install -r requirements.txt"

  - name: Test
    needs: ["Build"]
    steps:
      - name: Run Tests
        command: "pytest"
        
  - name: Docker
    needs: ["Test"]
    steps:
      - name: Build Image
        command: "docker build -t $IMAGE_NAME:$IMAGE_TAG ."
