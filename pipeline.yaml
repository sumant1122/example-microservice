name: Python Microservice Pipeline
repository: https://github.com/your-username/python-microservice.git
branch: main

# Global configuration
env:
  IMAGE_NAME: "your-docker-username/hello-world-service"
  IMAGE_TAG: "latest"

on_success: "echo 'Microservice deployed!'"
on_failure: "echo 'Deployment failed!'"

jobs:
  - name: Build
    steps:
      - name: Install Dependencies
        command: "pip install -r requirements.txt"

  - name: Test
    needs: ["Build"]
    steps:
      - name: Run Tests
        command: "pytest"

  - name: Docker
    needs: ["Test"]
    steps:
      - name: Build Image
        command: "docker build -t $IMAGE_NAME:$IMAGE_TAG ."
      
      - name: Login to DockerHub
        # It's safer to have 'docker login' configured on the runner machine beforehand
        command: "docker login -u $DOCKER_USER -p $DOCKER_PASS"
      
      - name: Push to Registry
        command: "docker push $IMAGE_NAME:$IMAGE_TAG"
